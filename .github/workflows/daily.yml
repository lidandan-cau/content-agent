name: 个人品牌内容 · 每日双格式推送

on:
  schedule:
    - cron: '30 1 * * *'  # 每天 UTC 1:30 = 北京时间 9:30
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 运行 Agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python agent.py
